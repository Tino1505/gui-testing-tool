<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Medical HUB - Đăng nhập</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#0072BC',
                            hover: '#005A96',
                            light: '#E6F1F8'
                        },
                        secondary: '#C9A84C'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] rounded-full opacity-[0.03] blur-[100px] pointer-events-none" style="background: radial-gradient(circle, #0072BC, transparent 70%);"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] rounded-full opacity-[0.03] blur-[100px] pointer-events-none" style="background: radial-gradient(circle, #C9A84C, transparent 70%);"></div>

    <div class="relative z-10 flex w-full max-w-5xl items-center p-6 gap-12">
        <!-- Left panel (Illustrations/Logo) -->
        <div class="hidden lg:flex flex-1 flex-col items-center justify-center text-center space-y-6">
            <span class="text-primary font-bold text-4xl tracking-wider flex items-center gap-2.5">
                <span class="bg-primary text-white p-3 rounded-2xl flex items-center justify-center shadow-lg">VM</span>
                <span class="font-extrabold text-3xl text-slate-800">VINMEC</span>
            </span>
            <div class="max-w-md">
                <h1 class="text-xl font-bold text-slate-700">Hệ thống Quản lý Y tế Thông minh</h1>
                <p class="text-xs text-slate-400 mt-2">Smart Medical HUB - The Next Generation Hospital & Clinic Management System</p>
            </div>
            <img src="https://via.placeholder.com/300x150?text=Vinmec+Healthcare" alt="Vinmec Healthcare" class="w-auto h-40 opacity-75 rounded-2xl">
        </div>

        <!-- Right panel (Login Form) -->
        <div class="flex-1 flex items-center justify-center">
            <div class="w-full max-w-[480px] bg-white rounded-2xl border border-slate-200/80 shadow-2xl p-8 sm:p-10 space-y-6">
                <!-- Brand Title -->
                <div class="text-center space-y-2 pb-4 border-b border-slate-100">
                    <h2 class="font-extrabold text-2xl text-primary">Smart Medical HUB</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Hệ thống quản lý y tế tương lai</p>
                </div>

                <!-- Form Welcome Header -->
                <div class="text-center space-y-1">
                    <h3 class="font-bold text-slate-800 text-lg">Chào mừng trở lại</h3>
                    <p class="text-xs text-slate-400">Đăng nhập để truy cập hệ thống</p>
                </div>

                <!-- Action Button SIT (Required for SIT Flow) -->
                <button onclick="window.location.href='/authen-vinmec'" class="inline-flex items-center justify-center gap-2 bg-primary hover:bg-primary-hover px-4 py-3.5 w-full text-sm font-bold rounded-xl text-white shadow-lg shadow-primary/20 transition-all border-0 cursor-pointer">
                    <i data-lucide="key-round" class="h-4.5 w-4.5"></i>
                    <span>Đăng nhập SIT</span>
                </button>

                <!-- Separator -->
                <div class="flex items-center gap-3">
                    <div class="flex-1 h-px bg-slate-100"></div>
                    <span class="text-[11px] text-slate-400 font-medium">hoặc đăng nhập bằng</span>
                    <div class="flex-1 h-px bg-slate-100"></div>
                </div>

                <!-- Form options (Local Login / V-ID) -->
                <div class="space-y-2.5">
                    <button onclick="window.location.href='/authen-vinmec'" class="inline-flex items-center justify-center gap-2 border hover:bg-slate-50 px-4 py-3 w-full text-xs font-semibold rounded-xl text-slate-600 border-slate-200 transition-all cursor-pointer">
                        <i data-lucide="user" class="h-4 w-4"></i>
                        <span>Đăng nhập Local</span>
                    </button>
                    <button onclick="window.location.href='/authen-vinmec'" class="inline-flex items-center justify-center gap-2 border hover:bg-slate-50 px-4 py-3 w-full text-xs font-semibold rounded-xl text-slate-600 border-slate-200 transition-all cursor-pointer">
                        <i data-lucide="shield-check" class="h-4 w-4"></i>
                        <span>Đăng nhập qua V-ID</span>
                    </button>
                </div>

                <!-- Footer Language -->
                <div class="flex justify-between items-center pt-2">
                    <span class="text-[11px] text-slate-400">Developed by VinSmart Future</span>
                    <div class="flex gap-0.5 rounded-lg p-0.5 bg-slate-100">
                        <button class="px-2.5 py-1 text-[10px] font-bold rounded-md text-slate-400 hover:text-slate-600 transition-colors">EN</button>
                        <button class="px-2.5 py-1 text-[10px] font-bold rounded-md bg-white text-primary shadow-sm">VI</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
